<!DOCTYPE html>
<html>
<head>
    <title>Server Members</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
        .member { background: #16213e; padding: 15px; margin: 10px; border-radius: 10px; }
        .online { border-left: 5px solid #43b581; }
        .idle { border-left: 5px solid #faa61a; }
        .dnd { border-left: 5px solid #f04747; }
        .offline { border-left: 5px solid #747f8d; opacity: 0.5; }
        img { border-radius: 50%; width: 50px; vertical-align: middle; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>📊 Server Members</h1>
    <div id="members"></div>

    <script>
        // 🔥 Your public URL from ngrok/Cloudflare/Serveo
        const API_URL = "https://your-url.serveo.net/members";
        
        async function fetchMembers() {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            document.getElementById('members').innerHTML = data.members.map(m => `
                <div class="member ${m.status}">
                    <img src="${m.avatar}">
                    <strong>${m.name}</strong>
                    <span>${m.status.toUpperCase()} ${m.activity || ''}</span>
                </div>
            `).join('');
        }
        
        fetchMembers();
        setInterval(fetchMembers, 5000); // Updates every 5 seconds
    </script>
</body>
</html>
