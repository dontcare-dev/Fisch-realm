<!DOCTYPE html>
<html>
<head>
    <title>Server Members</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px; 
            background: #0a0a1a; 
            color: white; 
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin: 20px 0; font-size: 28px; }
        .count { text-align: center; margin: 10px 0 30px; font-size: 18px; opacity: 0.8; }
        .member { 
            background: #1a1a2e; 
            padding: 15px 20px; 
            margin: 10px 0; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            transition: all 0.3s;
        }
        .member:hover { transform: scale(1.01); background: #222240; }
        .online { border-left: 4px solid #43b581; }
        .idle { border-left: 4px solid #faa61a; }
        .dnd { border-left: 4px solid #f04747; }
        .offline { border-left: 4px solid #747f8d; opacity: 0.5; }
        .member img { 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            object-fit: cover;
            border: 2px solid #2a2a4a;
        }
        .member .info { flex: 1; }
        .member .name { font-weight: 600; font-size: 16px; }
        .member .bot-badge { 
            background: #5865f2; 
            font-size: 10px; 
            padding: 2px 8px; 
            border-radius: 10px; 
            margin-left: 8px;
        }
        .status-badge { 
            display: inline-block;
            padding: 2px 12px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .online .status-badge { background: #43b581; color: #fff; }
        .idle .status-badge { background: #faa61a; color: #fff; }
        .dnd .status-badge { background: #f04747; color: #fff; }
        .offline .status-badge { background: #2a2a4a; color: #747f8d; }
        .activity { 
            font-size: 13px; 
            opacity: 0.7; 
            margin-top: 2px;
        }
        .loading { text-align: center; padding: 50px; opacity: 0.5; }
        .error { text-align: center; padding: 50px; color: #f04747; }
        .footer { text-align: center; margin: 40px 0 20px; opacity: 0.3; font-size: 12px; }
        .last-update { text-align: center; font-size: 12px; opacity: 0.4; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Server Members</h1>
        <div class="count" id="count">Loading...</div>
        <div id="members"></div>
        <div class="last-update" id="updateTime"></div>
        <div class="footer">Live Discord Presence</div>
    </div>

    <script>
        // 🔥 PUT YOUR ZROK URL HERE
        const API_URL = "https://c7sv9gs18qba.share.zrok.io/members";
        
        async function fetchMembers() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                
                const total = data.members.length;
                const online = data.members.filter(m => m.status === 'online').length;
                document.getElementById('count').textContent = `👥 ${total} members • 🟢 ${online} online`;
                
                document.getElementById('members').innerHTML = data.members.map(m => `
                    <div class="member ${m.status}">
                        <img src="${m.avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                        <div class="info">
                            <div class="name">
                                ${m.display_name || m.name}
                                ${m.bot ? '<span class="bot-badge">🤖 BOT</span>' : ''}
                            </div>
                            <span class="status-badge">${m.status === 'dnd' ? '🔴' : m.status === 'idle' ? '🟡' : m.status === 'online' ? '🟢' : '⚫'} ${m.status.toUpperCase()}</span>
                            ${m.activity ? `<div class="activity">🎮 ${m.activity}</div>` : ''}
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('updateTime').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch(e) {
                document.getElementById('members').innerHTML = `<div class="error">❌ ${e.message}</div>`;
            }
        }
        
        fetchMembers();
        setInterval(fetchMembers, 5000);
    </script>
</body>
</html>
